spring.application.name=webapplication
server.port=${PORT:8082}
#DATABASE CONFIGURATION
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/webapplication?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Meraj@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HIKARI CONNECTION POOL CONFIGURATION FOR HOSTING OPTIMIZATION
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

#HIBERNATE / JPA CONFIGURATION (Table Auto-Generation)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



#CUSTOM JWT SECURITY CONFIGURATION
